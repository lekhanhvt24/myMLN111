    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script>
        function getCardDescriptions() {
            return {
                "Át Bích": [
                    "Át Bích đại diện cho sản xuất vật chất, nền tảng của mọi đời sống xã hội và kinh tế. Lá bài nhắc rằng tư duy triết học phải luôn bám sát thực tiễn sản xuất vật chất để phản ánh chính xác thế giới.",
                    "Trong chủ nghĩa duy vật biện chứng, sản xuất vật chất là khởi điểm cho sự phát triển lịch sử và là yếu tố quyết định mối quan hệ giữa con người và tự nhiên. Nó là cơ sở cho mọi thay đổi xã hội và ý thức."
                ],
                "2 Bích": [
                    "2 Bích thể hiện lực lượng sản xuất, bao gồm con người, tư liệu lao động và trình độ kỹ thuật. Lá bài nhắc rằng trình độ phát triển của lực lượng sản xuất quyết định khả năng xã hội hóa và tiến hóa của nền kinh tế.",
                    "Trong phân tích triết học, khi lực lượng sản xuất phát triển, nó tạo ra nhu cầu thay đổi cơ cấu xã hội và quan hệ sản xuất. Đây là động lực chính của sự tiến bộ lịch sử."
                ],
                "3 Bích": [
                    "3 Bích gợi ý về quan hệ sản xuất, hình thức tổ chức kinh tế và mối quan hệ giữa những người sản xuất. Lá bài này nhấn mạnh rằng quan hệ sản xuất phản ánh trình độ phát triển của lực lượng sản xuất.",
                    "Một xã hội chỉ phát triển bền vững khi quan hệ sản xuất phù hợp với trình độ của lực lượng sản xuất. Khi không còn phù hợp, mâu thuẫn sẽ phát sinh và thay đổi xã hội là tất yếu."
                ],
                "4 Bích": [
                    "4 Bích đề cập tới quy luật quan hệ sản xuất phù hợp với trình độ phát triển của lực lượng sản xuất. Nó là nguyên tắc giúp xã hội duy trì cân bằng giữa hạ tầng cơ sở và thượng tầng kiến trúc.",
                    "Lá bài này nhắc rằng mỗi giai đoạn lịch sử đều cần quan hệ sản xuất phù hợp với trình độ kỹ thuật và vật chất hiện có. Nếu không phù hợp, xã hội sẽ rơi vào khủng hoảng và phải điều chỉnh."
                ],
                "5 Bích": [
                    "5 Bích chỉ cơ sở hạ tầng, nền tảng vật chất của xã hội do lực lượng sản xuất và quan hệ sản xuất tạo nên. Lá bài này cảnh báo rằng mọi đổi mới chính trị và văn hóa phải xuất phát từ cơ sở hạ tầng.",
                    "Trong duy vật lịch sử, cơ sở hạ tầng là yếu tố quyết định cho cấu trúc xã hội. Khi cơ sở hạ tầng thay đổi, thượng tầng kiến trúc và nhận thức xã hội cũng phải thích nghi theo."
                ],
                "6 Bích": [
                    "6 Bích biểu thị kiến trúc thượng tầng, gồm chính trị, pháp luật, tư tưởng và văn hóa. Lá bài này nhắc rằng kiến trúc thượng tầng được xây dựng trên cơ sở hạ tầng và phản ánh các mối quan hệ vật chất của xã hội.",
                    "Nhận thức rằng kiến trúc thượng tầng có thể tác động ngược lại lên cơ sở hạ tầng giúp ta hiểu sâu hơn mối quan hệ biện chứng giữa ý thức và vật chất. Khi cơ sở thay đổi, kiến trúc thượng tầng cũng phải thay đổi."
                ],
                "7 Bích": [
                    "7 Bích là hình thái kinh tế - xã hội, biểu hiện toàn bộ cách thức sản xuất và tổ chức xã hội của một giai đoạn. Lá bài nhấn mạnh tính lịch sử của các hình thái kinh tế-xã hội: mỗi giai đoạn có một cấu trúc sản xuất riêng.",
                    "Triết học duy vật cho rằng hình thái kinh tế - xã hội được hình thành từ tổng hòa cơ sở hạ tầng và kiến trúc thượng tầng. Khi lực lượng sản xuất phát triển tới một ngưỡng, hình thái mới sẽ dần thay thế hình thái cũ."
                ],
                "8 Bích": [
                    "8 Bích chỉ tồn tại xã hội, tức điều kiện vật chất sống và quan hệ sinh tồn của con người trong xã hội. Lá bài này nhắc rằng tồn tại xã hội là tiền đề cho mọi ý thức và hoạt động con người.",
                    "Theo triết học, tồn tại xã hội quyết định ý thức xã hội, đồng thời bị chi phối bởi các phương thức sản xuất và quan hệ sản xuất. Khi những điều kiện này thay đổi, ý thức cũng có thể thay đổi theo."
                ],
                "9 Bích": [
                    "9 Bích biểu thị ý thức xã hội, hệ thống quan điểm, giá trị và niềm tin phản ánh thực tại xã hội. Lá bài này nhấn mạnh rằng ý thức xã hội không tồn tại tách rời mà phụ thuộc vào tồn tại xã hội.",
                    "Trong phép biện chứng, ý thức xã hội phản ánh và đồng thời tác động trở lại vào tồn tại xã hội. Nó tạo thành một vòng tuần hoàn vận động liên tục giữa thực tiễn và nhận thức."
                ],
                "10 Bích": [
                    "10 Bích đại diện cho cơ cấu giai cấp, sự phân tầng quyền lực và lợi ích trong xã hội. Lá bài này là lời nhắc rằng giai cấp xã hội được hình thành dựa trên sự sở hữu và quan hệ trong sản xuất.",
                    "Trong triết học duy vật, cơ cấu giai cấp không chỉ phản ánh sự phân chia sản xuất mà còn xác định hướng đi của đấu tranh giai cấp và sự biến đổi xã hội."
                ],
                "J Bích": [
                    "J Bích khắc họa đấu tranh giai cấp, lực lượng đối kháng trong xã hội nhằm thay đổi sự phân chia quyền lợi. Lá bài này nhấn mạnh rằng đấu tranh giai cấp là động lực của lịch sử xã hội.",
                    "Nhận thức đúng về đấu tranh giai cấp giúp ta thấy rằng các xung đột xã hội không phải là tai họa ngẫu nhiên mà là biểu hiện của mâu thuẫn trong quan hệ sản xuất và cơ cấu giai cấp."
                ],
                "Q Bích": [
                    "Q Bích biểu trưng cho vai trò quần chúng nhân dân, lực lượng đông đảo quyết định vận mệnh của xã hội. Lá bài này nhắc rằng quần chúng là nguồn gốc sức mạnh lịch sử và giai cấp cách mạng.",
                    "Triết học duy vật cho rằng quần chúng nhân dân không chỉ là đối tượng của chính sách, mà còn là chủ thể sáng tạo trong sự phát triển xã hội và cách mạng."
                ],
                "K Bích": [
                    "K Bích là bản chất con người, chiều sâu xã hội và nhân văn trong mọi hành vi. Lá bài này gợi nhắc rằng bản chất con người luôn gắn liền với điều kiện xã hội, không phải một thực thể cố định.",
                    "Trong quan điểm duy vật lịch sử, bản chất con người được hình thành và biến đổi theo quá trình lịch sử, sản xuất và quan hệ xã hội. Hiểu đúng bản chất con người giúp ta xác định con đường phát triển xã hội."
                ]
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.mini-card.cursor-pointer');
            const modal = document.getElementById('card-modal');
            const modalImage = document.getElementById('modal-card-image');
            const modalTitle = document.getElementById('modal-card-title');
            const modalDescription = document.getElementById('modal-card-description');
            const closeButton = document.getElementById('modal-close');
            const backdrop = modal.querySelector('[data-modal-close]');
            const descriptions = getCardDescriptions();

            function openModal(title, imgSrc) {
                modalImage.src = imgSrc;
                modalImage.alt = title;
                modalTitle.innerText = title;
                modalDescription.innerHTML = descriptions[title]
                    ? descriptions[title].map((p) => `<p>${p}</p>`).join('')
                    : `<p>Không có mô tả cho lá bài này.</p>`;
                document.body.classList.add('modal-open');
                modal.classList.remove('hidden');
                requestAnimationFrame(() => modal.classList.add('open'));
            }

            function closeModal() {
                modal.classList.remove('open');
                document.body.classList.remove('modal-open');
                modal.addEventListener('transitionend', function hide(event) {
                    if (event.target === modal) {
                        modal.classList.add('hidden');
                        modal.removeEventListener('transitionend', hide);
                    }
                });
            }

            cards.forEach((card) => {
                card.addEventListener('click', () => {
                    const title = card.querySelector('.text-sm.font-semibold')?.innerText?.trim() || '';
                    const img = card.querySelector('img');
                    openModal(title, img.src);
                });
            });

            closeButton.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
            modal.querySelector('.modal-container').addEventListener('click', (event) => event.stopPropagation());
        });
    </script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const modeText = document.getElementById('mode-text');
        function updateTheme(isLight) {
            if (isLight) {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                if(modeText) modeText.innerText = "TỰ DO (DƯƠNG)";
            } else {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
                if(modeText) modeText.innerText = "TÙ TÚNG (ÂM)";
            }
        }
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') { toggle.checked = true; updateTheme(true); }
        else { toggle.checked = false; updateTheme(false); }
        toggle.addEventListener('change', function() {
            localStorage.setItem('theme', this.checked ? 'light' : 'dark');
            updateTheme(this.checked);
        });
    </script>
</body>
</html>
