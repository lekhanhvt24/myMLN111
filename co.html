    <script>
        function getCardDescriptions() {
            return {
                "Át Cơ": [
                    "Bản chất của nhận thức: Là quá trình phản ánh tích cực, tự giác và sáng tạo thế giới khách quan vào bộ óc con người.",

                ],
                "2 Cơ": [
                    "Nhận thức cảm tính (Trực quan sinh động): Là giai đoạn đầu tiên của quá trình nhận thức.",
                    "Bao gồm 3 hình thức: Cảm giác, Tri giác và Biểu tượng. Ở giai đoạn này, nhận thức phản ánh những đặc điểm bề ngoài của sự vật."
                ],
                "3 Cơ": [
                    "Nhận thức lý tính (Tư duy trừu tượng): Là giai đoạn cao hơn, phản ánh bản chất, quy luật bên trong của sự vật.",
                    "Bao gồm 3 hình thức: Khái niệm, Phán đoán và Suy luận."
                ],
                "4 Cơ": [
                    "Thực tiễn: Là toàn bộ những hoạt động vật chất có mục đích, mang tính lịch sử - xã hội của con người nhằm cải tạo tự nhiên và xã hội.",
                    "Các hình thức cơ bản của thực tiễn: Hoạt động sản xuất vật chất, hoạt động chính trị - xã hội và hoạt động thực nghiệm khoa học."
                ],
                "5 Cơ": [
                    "Chân lý: Là những tri thức phù hợp với hiện thực khách quan và được thực tiễn kiểm nghiệm.",
                    "Đặc tính của chân lý: Tính khách quan, tính tuyệt đối, tính tương đối và tính cụ thể."
                ],
                "6 Cơ": [
                    "Tính khách quan của chân lý: Nội dung của chân lý không phụ thuộc vào ý chí chủ quan của con người.",
                    "Mặc dù chân lý là nhận thức của con người, nhưng nội dung mà nó phản ánh tồn tại độc lập với ý thức."
                ],
                "7 Cơ": [
                    "Mối quan hệ giữa nhận thức và thực tiễn: Là mối quan hệ biện chứng.",
                    "Thực tiễn đóng vai trò quyết định đối với nhận thức, ngược lại nhận thức đúng đắn sẽ dẫn đường, định hướng cho hoạt động thực tiễn."
                ],
                "8 Cơ": [
                    "Cảm giác: Là hình thức đầu tiên, đơn giản nhất của nhận thức cảm tính.",
                    "Phản ánh từng thuộc tính riêng lẻ của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào các giác quan của con người."
                ],
                "9 Cơ": [
                    "Khái niệm: Là hình thức cơ bản của tư duy trừu tượng.",
                    "Phản ánh những đặc tính bản chất, phổ biến của một lớp các sự vật, hiện tượng."
                ],
                "10 Cơ": [
                    "Sự thống nhất giữa trực quan sinh động và tư duy trừu tượng: Quá trình nhận thức phải đi từ cảm tính đến lý tính.",
                    "Thiếu nhận thức cảm tính thì lý tính không có cơ sở; thiếu nhận thức lý tính thì không nắm bắt được bản chất sự vật."
                ],
                "J Cơ": [
                    "Sự phát triển của nhận thức: Là một quá trình biện chứng, vòng khâu đi từ cái chưa biết đến cái biết, từ biết ít đến biết nhiều.",
                    "Nhận thức không bao giờ dừng lại mà luôn vận động cùng với sự phát triển của thực tiễn."
                ],
                "Q Cơ": [
                    "Lý luận và kinh nghiệm: Kinh nghiệm là cơ sở để khái quát thành lý luận.",
                    "Lý luận khi được soi sáng và kiểm chứng qua thực tiễn sẽ trở nên sắc bén và định hướng ngược lại cho kinh nghiệm."
                ],
                "K Cơ": [
                    "Con đường biện chứng của sự nhận thức chân lý: \"Từ trực quan sinh động đến tư duy trừu tượng, và từ tư duy trừu tượng đến thực tiễn\".",
                    "Đây là công thức nổi tiếng của V.I. Lênin tóm tắt toàn bộ quy luật của quá trình nhận thức."
                ]
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.mini-card.cursor-pointer');
            const modal = document.getElementById('card-modal');
            const modalImage = document.getElementById('modal-card-image');
            const modalTitle = document.getElementById('modal-card-title');
            const modalDescription = document.getElementById('modal-card-description');
            const closeButton = document.getElementById('modal-close');
            const backdrop = modal.querySelector('[data-modal-close]');
            const descriptions = getCardDescriptions();

            function openModal(title, imgSrc) {
                modalImage.src = imgSrc;
                modalImage.alt = title;
                modalTitle.innerText = title;
                modalDescription.innerHTML = descriptions[title]
                    ? descriptions[title].map((p) => `<p>${p}</p>`).join('')
                    : `<p>Không có mô tả cho lá bài này.</p>`;
                document.body.classList.add('modal-open');
                modal.classList.remove('hidden');
                requestAnimationFrame(() => modal.classList.add('open'));
            }

            function closeModal() {
                modal.classList.remove('open');
                document.body.classList.remove('modal-open');
                modal.addEventListener('transitionend', function hide(event) {
                    if (event.target === modal) {
                        modal.classList.add('hidden');
                        modal.removeEventListener('transitionend', hide);
                    }
                });
            }

            cards.forEach((card) => {
                card.addEventListener('click', () => {
                    const title = card.querySelector('.text-sm.font-semibold')?.innerText?.trim() || '';
                    const img = card.querySelector('img');
                    openModal(title, img.src);
                });
            });

            closeButton.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
            modal.querySelector('.modal-container').addEventListener('click', (event) => event.stopPropagation());
        });
    </script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const modeText = document.getElementById('mode-text');
        function updateTheme(isLight) {
            if (isLight) {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                if(modeText) modeText.innerText = "TỰ DO (DƯƠNG)";
            } else {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
                if(modeText) modeText.innerText = "TÙ TÚNG (ÂM)";
            }
        }
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') { toggle.checked = true; updateTheme(true); }
        else { toggle.checked = false; updateTheme(false); }
        toggle.addEventListener('change', function() {
            localStorage.setItem('theme', this.checked ? 'light' : 'dark');
            updateTheme(this.checked);
        });
    </script>
