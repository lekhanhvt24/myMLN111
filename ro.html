    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script>
        function getCardDescriptions() {
            return {
                "Át Rô": [

                    "Trong triết học duy vật, hiện thực khách quan là cơ sở đầu tiên của nhận thức. Hiểu rõ tính khách quan giúp ta xây dựng tri thức đúng đắn và thoát khỏi những quan điểm phi vật chất."
                ],
                "2 Rô": [
                    "Biện chứng chủ quan đề cao vai trò của tư duy trong việc phát hiện các quy luật khách quan. Lá bài này nhắc rằng tư duy phải làm sáng tỏ mối quan hệ giữa con người và tự nhiên.",
                    "Khi nghiên cứu triết học, chủ nghĩa duy vật biện chứng xem nhận thức chủ quan là phương tiện để phản ánh khách quan, nhưng không được tách rời khỏi thực tiễn."
                ],
                "3 Rô": [
                    "Nguyên lý về mối liên hệ phổ biến chỉ rằng tất cả sự vật liên hệ với nhau và không tồn tại độc lập. Lá bài này nhắc ta rằng mọi hiện tượng trong tự nhiên và xã hội đều gắn kết với nhau.",
                    "Trong phép biện chứng, mối liên hệ phổ biến tạo thành một mạng lưới động, nơi biến đổi của một phần sẽ tác động đến toàn thể và ngược lại."
                ],
                "4 Rô": [
                    "Nguyên lý về sự phát triển biểu thị rằng mọi sự vật đều vận động và biến đổi. Lá bài này nhắc rằng không có gì đứng yên; ngay cả những cấu trúc ổn định nhất cũng chịu sự thay đổi theo thời gian.",
                    "Sự phát triển trong biện chứng không phải là một tiến trình tuyến tính đơn giản, mà là quá trình có chiều sâu, pha trộn giữa lượng và chất, và biến đổi qua các giai đoạn."
                ],
                "5 Rô": [
                    "Mặt đối lập là cặp phạm trù sinh động trong mọi sự vật. Lá bài này nhấn mạnh rằng bản thân sự vật chứa đựng hai mặt đối lập, vừa thống nhất vừa đấu tranh với nhau.",
                    "Theo biện chứng, mâu thuẫn giữa hai mặt đối lập là nguồn gốc của vận động và phát triển. Không có đối lập thì không có chuyển hóa, cũng không có sự vận hành của thực tại."
                ],
                "6 Rô": [
                    "Mâu thuẫn biện chứng là động lực nội tại của sự phát triển. Lá bài này cho thấy mỗi sự vật đều mang trong mình mâu thuẫn, và chính mâu thuẫn làm cho sự vật thay đổi.",
                    "Phân tích mâu thuẫn giúp ta hiểu được nguồn gốc của xung đột và sự biến đổi trong tự nhiên và xã hội. Mâu thuẫn không chỉ là xung đột, mà còn là nhân tố tạo nên tổng thể động."
                ],
                "7 Rô": [
                    "Lượng là phạm trù biểu thị mức độ, khối lượng và phạm vi của sự vật. Lá bài này nhắc rằng khi lượng thay đổi đến ngưỡng nhất định, nó sẽ dẫn đến thay đổi về chất.",
                    "Trong biện chứng, sự tích lũy lượng dẫn đến sự biến đổi chất là một nguyên lý cơ bản, cho thấy mối quan hệ chặt chẽ giữa lượng và chất."
                ],
                "8 Rô": [
                    "Chất là phạm trù phản ánh bản chất đặc thù của sự vật. Lá bài này nhấn rằng mỗi sự vật có tính chất riêng, khác biệt và xác định hình thái tồn tại của nó.",
                    "Khi chất thay đổi, bản thể của sự vật biến đổi. Sự tiếp xúc giữa các yếu tố khác nhau có thể sản sinh ra chất mới, tạo ra những dạng mới của tồn tại."
                ],
                "9 Rô": [
                    "Độ - Điểm nút - Bước nhảy chỉ việc thay đổi không liên tục khi lượng đến một giới hạn nhất định. Lá bài này gợi nhắc rằng phát triển biện chứng thường diễn ra qua những bước nhảy đột ngột.",
                    "Quá trình biến đổi chất không xảy ra từ từ mà có thể bùng nổ khi lượng tích tụ đạt tới điểm nút. Điều này giải thích sự xuất hiện của những biến cố lịch sử và tự nhiên."
                ],
                "10 Rô": [
                    "Phủ định biện chứng là sự đi lên qua sự tiêu diệt cái cũ để hình thành cái mới. Lá bài này nhấn rằng trong phát triển, mỗi giai đoạn cũ bị phủ định để tạo điều kiện cho giai đoạn kế tiếp.",
                    "Phủ định biện chứng không phải là hủy diệt vô nghĩa, mà là quá trình lịch sử cần thiết để làm mới và tái cấu trúc sự vật."
                ],
                "J Rô": [
                    "Phủ định của phủ định là vòng phát triển bậc cao, hình thành quá trình xoáy trôn ốc của lịch sử. Lá bài này nhắc rằng sự phát triển đi qua hai lần phủ định để xuất hiện cái mới hoàn chỉnh hơn.",
                    "Trong triết học biện chứng, phủ định của phủ định cho thấy mỗi bước tiến lịch sử đều giữ lại những yếu tố tích cực của quá khứ và nâng chúng lên một trình độ mới."
                ],
                "Q Rô": [
                    "Quan điểm toàn diện yêu cầu nhìn nhận sự vật trong mối quan hệ tổng thể. Lá bài này nhấn rằng chỉ khi xem xét mọi mặt liên quan thì ta mới có thể hiểu đúng bản chất của vấn đề.",
                    "Quán triệt quan điểm toàn diện giúp ta tránh được suy nghĩ mệnh lệnh và tách rời, đồng thời nhận diện được các yếu tố tương hỗ và tương tác."
                ],
                "K Rô": [
                    "Quan điểm phát triển là cách nhìn nhận sự vật như một quá trình động. Lá bài này nhắc rằng mọi sự vật đều có lịch sử, không có gì tồn tại một cách tĩnh tại.",
                    "Áp dụng quan điểm phát triển nghĩa là chúng ta phải xem xét sự vật theo thời gian, dự đoán những chiều hướng thay đổi và nhận diện khả năng tiến hóa của nó."
                ]
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.mini-card.cursor-pointer');
            const modal = document.getElementById('card-modal');
            const modalImage = document.getElementById('modal-card-image');
            const modalTitle = document.getElementById('modal-card-title');
            const modalDescription = document.getElementById('modal-card-description');
            const closeButton = document.getElementById('modal-close');
            const backdrop = modal.querySelector('[data-modal-close]');
            const descriptions = getCardDescriptions();

            function openModal(title, imgSrc) {
                modalImage.src = imgSrc;
                modalImage.alt = title;
                modalTitle.innerText = title;
                modalDescription.innerHTML = descriptions[title]
                    ? descriptions[title].map((p) => `<p>${p}</p>`).join('')
                    : `<p>Không có mô tả cho lá bài này.</p>`;
                document.body.classList.add('modal-open');
                modal.classList.remove('hidden');
                requestAnimationFrame(() => modal.classList.add('open'));
            }

            function closeModal() {
                modal.classList.remove('open');
                document.body.classList.remove('modal-open');
                modal.addEventListener('transitionend', function hide(event) {
                    if (event.target === modal) {
                        modal.classList.add('hidden');
                        modal.removeEventListener('transitionend', hide);
                    }
                });
            }

            cards.forEach((card) => {
                card.addEventListener('click', () => {
                    const title = card.querySelector('.text-sm.font-semibold')?.innerText?.trim() || '';
                    const img = card.querySelector('img');
                    openModal(title, img.src);
                });
            });

            closeButton.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
            modal.querySelector('.modal-container').addEventListener('click', (event) => event.stopPropagation());
        });
    </script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const modeText = document.getElementById('mode-text');
        function updateTheme(isLight) {
            if (isLight) {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                if(modeText) modeText.innerText = "TỰ DO (DƯƠNG)";
            } else {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
                if(modeText) modeText.innerText = "TÙ TÚNG (ÂM)";
            }
        }
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') { toggle.checked = true; updateTheme(true); }
        else { toggle.checked = false; updateTheme(false); }
        toggle.addEventListener('change', function() {
            localStorage.setItem('theme', this.checked ? 'light' : 'dark');
            updateTheme(this.checked);
        });
    </script>
</body>
</html>
